<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREACH PROTOCOL // SOLVER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  :root {
    --yellow: #FFE801;
    --cyan: #00F0FF;
    --red: #FF003C;
    --bg: #050A0E;
    --panel: #0A1520;
    --border: #1A3A50;
    --text: #7ABFCC;
    --dim: #2A5A6A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* Flicker animation */
  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.85; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }
  body { animation: flicker 8s infinite; }

  @keyframes glow-pulse {
    0%,100% { text-shadow: 0 0 8px var(--yellow), 0 0 20px rgba(255,232,1,0.4); }
    50% { text-shadow: 0 0 14px var(--yellow), 0 0 35px rgba(255,232,1,0.6); }
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0; }
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,21,32,0.9);
  }

  .header-title {
    color: var(--yellow);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 4px;
    animation: glow-pulse 3s infinite;
  }

  .header-title span { color: var(--cyan); }

  .header-sub {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
  }

  .fps { color: var(--yellow); font-size: 11px; }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    gap: 20px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--yellow);
  }

  .panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,232,1,0.04);
  }

  .panel-icon {
    width: 8px; height: 8px;
    background: var(--yellow);
    transform: rotate(45deg);
  }

  .panel-title {
    color: var(--yellow);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
  }

  .panel-body { padding: 16px; }

  /* Matrix grid */
  .matrix-grid {
    display: inline-grid;
    gap: 4px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .matrix-row {
    display: flex;
    gap: 4px;
  }

  .cell {
    width: 52px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    color: var(--text);
    transition: all 0.1s;
    position: relative;
    letter-spacing: 1px;
    user-select: none;
  }

  .cell:hover:not(.used):not(.locked-row):not(.locked-col) {
    background: rgba(255,232,1,0.1);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .cell.selectable {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,240,255,0.08);
    box-shadow: inset 0 0 8px rgba(0,240,255,0.15);
    cursor: pointer;
  }

  .cell.selectable:hover {
    background: rgba(0,240,255,0.18);
    box-shadow: inset 0 0 12px rgba(0,240,255,0.25);
  }

  .cell.selected {
    background: rgba(255,232,1,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: inset 0 0 10px rgba(255,232,1,0.2);
  }

  .cell.used {
    color: var(--dim);
    border-color: #0d2030;
    cursor: default;
    background: rgba(0,0,0,0.5);
  }

  .cell .step-num {
    position: absolute;
    top: 2px;
    right: 3px;
    font-size: 8px;
    color: var(--yellow);
    opacity: 0.8;
  }

  /* Row/col highlight */
  .cell.active-row, .cell.active-col {
    background: rgba(0,240,255,0.04);
  }

  /* Buffer */
  .buffer-display {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    justify-content: center;
  }

  .buffer-slot {
    width: 52px;
    height: 40px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    color: var(--yellow);
    transition: all 0.2s;
  }

  .buffer-slot.filled {
    border-color: var(--yellow);
    background: rgba(255,232,1,0.1);
    box-shadow: 0 0 8px rgba(255,232,1,0.2);
    animation: slide-in 0.2s ease;
  }

  .buffer-slot.empty {
    border-style: dashed;
    border-color: var(--dim);
  }

  /* Sequences */
  .sequence-list { display: flex; flex-direction: column; gap: 12px; }

  .sequence-item {
    border: 1px solid var(--border);
    padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s;
  }

  .sequence-item.complete {
    border-color: var(--yellow);
    background: rgba(255,232,1,0.06);
  }

  .sequence-item.complete .seq-status { color: var(--yellow); }

  .seq-codes {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .seq-code {
    padding: 4px 8px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: bold;
    color: var(--text);
    background: rgba(0,0,0,0.3);
    transition: all 0.3s;
  }

  .seq-code.matched {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255,232,1,0.12);
    box-shadow: 0 0 6px rgba(255,232,1,0.2);
  }

  .seq-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 1px;
    min-width: 160px;
    text-align: right;
  }

  .seq-status { font-size: 11px; color: var(--dim); min-width: 20px; }

  /* Controls */
  .controls { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border: 1px solid;
    background: transparent;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-primary {
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .btn-primary:hover { background: rgba(255,232,1,0.12); box-shadow: 0 0 10px rgba(255,232,1,0.2); }

  .btn-secondary {
    border-color: var(--dim);
    color: var(--dim);
  }
  .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,240,255,0.05); }

  .btn-danger {
    border-color: var(--red);
    color: var(--red);
  }
  .btn-danger:hover { background: rgba(255,0,60,0.1); }

  /* Config section */
  .config-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .config-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--dim);
    min-width: 80px;
  }

  .config-input {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--yellow);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 4px 8px;
    width: 56px;
    text-align: center;
    text-transform: uppercase;
  }

  .config-input:focus {
    outline: none;
    border-color: var(--yellow);
    box-shadow: 0 0 6px rgba(255,232,1,0.2);
  }

  select.config-input {
    width: auto;
    cursor: pointer;
  }

  /* Status bar */
  .status-bar {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    background: rgba(0,0,0,0.3);
  }

  .status-item span { color: var(--cyan); }

  /* Result message */
  .result-msg {
    text-align: center;
    padding: 12px;
    margin-top: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    display: none;
    border: 1px solid;
  }

  .result-msg.success {
    display: block;
    color: var(--yellow);
    border-color: var(--yellow);
    background: rgba(255,232,1,0.06);
    animation: glow-pulse 1s infinite;
  }

  .result-msg.fail {
    display: block;
    color: var(--red);
    border-color: var(--red);
    background: rgba(255,0,60,0.06);
  }

  /* Sequence input section */
  .seq-input-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }

  .seq-input-row .config-input { width: 52px; }

  .seq-label {
    font-size: 10px;
    color: var(--dim);
    min-width: 60px;
    letter-spacing: 1px;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    opacity: 0.6;
  }
  .remove-btn:hover { opacity: 1; }

  .solve-hint {
    font-size: 10px;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .solve-hint span {
    color: var(--cyan);
    animation: blink 1.5s infinite;
  }

  /* Auto-solve path highlight */
  .cell.path-highlight {
    background: rgba(255,232,1,0.15);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .cell.path-highlight.path-current {
    background: rgba(255,232,1,0.35);
    box-shadow: 0 0 12px rgba(255,232,1,0.4);
  }

  .solution-steps {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .solution-step {
    font-size: 11px;
    padding: 4px 8px;
    border-left: 2px solid var(--dim);
    color: var(--dim);
    letter-spacing: 1px;
    animation: slide-in 0.2s ease;
  }

  .solution-step.active {
    border-left-color: var(--yellow);
    color: var(--yellow);
  }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; padding: 12px; }
    .cell { width: 44px; height: 38px; font-size: 13px; }
    .buffer-slot { width: 44px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">BREACH <span>PROTOCOL</span></div>
    <div class="header-sub">NEURAL INTERFACE // ICE PENETRATION SYSTEM</div>
  </div>
  <div class="fps">FPS 205 | 143</div>
</div>

<div class="main">
  <!-- Left: Matrix + Buffer -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon"></div>
        <div class="panel-title">CODE MATRIX</div>
      </div>
      <div class="panel-body">
        <div id="bufferDisplay" class="buffer-display"></div>
        <div id="matrixContainer" class="matrix-grid"></div>
        <div class="controls">
          <button class="btn btn-primary" onclick="autoSolve()">▶ AUTO SOLVE</button>
          <button class="btn btn-secondary" onclick="resetGame()">↺ RESET</button>
        </div>
        <div id="resultMsg" class="result-msg"></div>
        <div id="solutionSteps" class="solution-steps"></div>
      </div>
      <div class="status-bar">
        <div class="status-item">BUFFER: <span id="bufferUsed">0</span>/<span id="bufferSize">6</span></div>
        <div class="status-item">ROW: <span id="curRow">—</span></div>
        <div class="status-item">COL: <span id="curCol">—</span></div>
        <div class="status-item">TURN: <span id="turnDisplay">ROW</span></div>
      </div>
    </div>

    <!-- Config -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon"></div>
        <div class="panel-title">MATRIX CONFIG</div>
      </div>
      <div class="panel-body">
        <div class="config-row">
          <span class="config-label">BUFFER SIZE</span>
          <select class="config-input" id="bufferSizeSelect" onchange="updateBufferSize()">
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6" selected>6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="config-row">
          <span class="config-label">GRID SIZE</span>
          <select class="config-input" id="gridSizeSelect" onchange="resizeGrid()">
            <option value="4">4×4</option>
            <option value="5">5×5</option>
            <option value="6" selected>6×6</option>
          </select>
        </div>
        <div id="matrixInputs" style="margin-top:12px;"></div>
        <div class="controls">
          <button class="btn btn-primary" onclick="loadMatrix()">LOAD MATRIX</button>
          <button class="btn btn-secondary" onclick="triggerScreenshotUpload()">📷 SCAN SCREENSHOT</button>
          <input type="file" id="screenshotInput" accept="image/*" style="display:none" onchange="handleScreenshotUpload(event)">
        </div>
        <div id="scanStatus" style="margin-top:8px;font-size:10px;letter-spacing:1px;color:var(--dim);display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Right: Sequences -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon"></div>
        <div class="panel-title">SEQUENCE REQUIRED TO UPLOAD DAEMON</div>
      </div>
      <div class="panel-body">
        <div id="sequenceList" class="sequence-list"></div>
        <p class="solve-hint">SELECT CODES MANUALLY OR PRESS <span>AUTO SOLVE</span></p>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon"></div>
        <div class="panel-title">DAEMON SEQUENCES CONFIG</div>
      </div>
      <div class="panel-body">
        <div id="seqInputArea"></div>
        <div class="controls">
          <button class="btn btn-secondary" onclick="addSequence()">+ ADD SEQUENCE</button>
          <button class="btn btn-primary" onclick="applySequences()">APPLY</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const CODES = ['1C','7A','55','BD','E9','FF'];

// Game state
let gridSize = 6;
let bufferSize = 6;
let matrix = [];
let buffer = [];
let selected = [];  // {row, col, code}
let turnIsRow = true;
let currentRow = null;
let currentCol = null;
let sequences = [];
let seqInputs = []; // [{name, codes[]}]

// Default: from screenshot
const DEFAULT_MATRIX = [
  ['1C','7A','55','1C','1C','1C'],
  ['BD','E9','E9','55','7A','E9'],
  ['BD','BD','1C','55','7A','55'],
  ['55','1C','1C','BD','7A','1C'],
  ['1C','7A','E9','BD','55','7A'],
  ['55','7A','BD','BD','1C','1C'],
];

const DEFAULT_SEQUENCES = [
  { name: 'BASIC DATAMINE', codes: ['E9','1C'] },
  { name: 'ADVANCED DATAMINE', codes: ['1C','BD'] },
  { name: 'EXPERT DATAMINE', codes: ['1C','7A','E9'] },
];

function init() {
  matrix = DEFAULT_MATRIX.map(r => [...r]);
  sequences = DEFAULT_SEQUENCES.map(s => ({...s, codes: [...s.codes]}));
  seqInputs = DEFAULT_SEQUENCES.map(s => ({name: s.name, codes: [...s.codes]}));
  gridSize = 6;
  bufferSize = 6;
  buffer = [];
  selected = [];
  turnIsRow = true;
  currentRow = null;
  currentCol = null;
  buildMatrixInputs();
  buildSeqInputArea();
  renderAll();
}

function renderAll() {
  renderBuffer();
  renderMatrix();
  renderSequences();
  renderStatus();
}

function renderBuffer() {
  const el = document.getElementById('bufferDisplay');
  el.innerHTML = '';
  for (let i = 0; i < bufferSize; i++) {
    const slot = document.createElement('div');
    slot.className = 'buffer-slot ' + (buffer[i] ? 'filled' : 'empty');
    slot.textContent = buffer[i] || '';
    el.appendChild(slot);
  }
}

function renderMatrix() {
  const container = document.getElementById('matrixContainer');
  container.innerHTML = '';

  for (let r = 0; r < gridSize; r++) {
    const row = document.createElement('div');
    row.className = 'matrix-row';
    for (let c = 0; c < gridSize; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = matrix[r][c];

      // Check if already selected
      const selIdx = selected.findIndex(s => s.row === r && s.col === c);
      if (selIdx !== -1) {
        cell.classList.add('selected');
        const num = document.createElement('span');
        num.className = 'step-num';
        num.textContent = selIdx + 1;
        cell.appendChild(num);
      } else if (isUsed(r, c)) {
        cell.classList.add('used');
      } else if (isSelectable(r, c)) {
        cell.classList.add('selectable');
        cell.onclick = () => selectCell(r, c);
      } else {
        // dim highlight for current row/col
        if (currentRow === r || currentCol === c) {
          cell.classList.add('active-row');
        }
      }
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
}

function isUsed(r, c) {
  return selected.some(s => s.row === r && s.col === c);
}

function isSelectable(r, c) {
  if (isUsed(r, c)) return false;
  if (buffer.length >= bufferSize) return false;
  if (selected.length === 0) return r === 0; // first pick: row 0
  if (turnIsRow) return r === currentRow;
  else return c === currentCol;
}

function selectCell(r, c) {
  if (!isSelectable(r, c)) return;
  const code = matrix[r][c];
  selected.push({ row: r, col: c, code });
  buffer.push(code);
  currentRow = r;
  currentCol = c;
  turnIsRow = !turnIsRow;
  checkSequences();
  renderAll();
}

function checkSequences() {
  const chain = buffer.join(' ');
  sequences.forEach(seq => {
    const seqStr = seq.codes.join(' ');
    seq.complete = chain.includes(seqStr);
    // Track how many codes matched from start of remaining
    seq.matched = 0;
    for (let i = 0; i <= buffer.length - seq.codes.length; i++) {
      let match = true;
      for (let j = 0; j < seq.codes.length; j++) {
        if (buffer[i+j] !== seq.codes[j]) { match = false; break; }
      }
      if (match) { seq.matched = seq.codes.length; break; }
    }
    if (!seq.complete) {
      // partial from end
      for (let len = Math.min(seq.codes.length - 1, buffer.length); len > 0; len--) {
        const tail = buffer.slice(buffer.length - len);
        const seqStart = seq.codes.slice(0, len);
        if (tail.join(' ') === seqStart.join(' ')) {
          seq.matched = len;
          break;
        }
      }
    }
  });

  const allDone = sequences.every(s => s.complete);
  const outOfMoves = buffer.length >= bufferSize;
  const msg = document.getElementById('resultMsg');
  if (allDone) {
    msg.className = 'result-msg success';
    msg.textContent = '✓ BREACH SUCCESSFUL — ALL DAEMONS UPLOADED';
  } else if (outOfMoves) {
    const completed = sequences.filter(s => s.complete).length;
    if (completed > 0) {
      msg.className = 'result-msg success';
      msg.textContent = `✓ PARTIAL BREACH — ${completed}/${sequences.length} DAEMONS UPLOADED`;
    } else {
      msg.className = 'result-msg fail';
      msg.textContent = '✗ BREACH FAILED — BUFFER EXHAUSTED';
    }
  } else {
    msg.className = 'result-msg';
    msg.style.display = 'none';
  }
}

function renderSequences() {
  const el = document.getElementById('sequenceList');
  el.innerHTML = '';
  sequences.forEach(seq => {
    const item = document.createElement('div');
    item.className = 'sequence-item' + (seq.complete ? ' complete' : '');
    
    const status = document.createElement('div');
    status.className = 'seq-status';
    status.textContent = seq.complete ? '✓' : '○';

    const codes = document.createElement('div');
    codes.className = 'seq-codes';
    seq.codes.forEach((code, i) => {
      const c = document.createElement('div');
      c.className = 'seq-code' + (seq.complete || i < (seq.matched||0) ? ' matched' : '');
      c.textContent = code;
      codes.appendChild(c);
    });

    const name = document.createElement('div');
    name.className = 'seq-name';
    name.textContent = seq.name;

    item.appendChild(status);
    item.appendChild(codes);
    item.appendChild(name);
    el.appendChild(item);
  });
}

function renderStatus() {
  document.getElementById('bufferUsed').textContent = buffer.length;
  document.getElementById('bufferSize').textContent = bufferSize;
  document.getElementById('curRow').textContent = currentRow !== null ? currentRow + 1 : '—';
  document.getElementById('curCol').textContent = currentCol !== null ? currentCol + 1 : '—';
  document.getElementById('turnDisplay').textContent = selected.length === 0 ? 'ROW 1' : (turnIsRow ? 'ROW' : 'COL');
}

function resetGame() {
  buffer = [];
  selected = [];
  turnIsRow = true;
  currentRow = null;
  currentCol = null;
  sequences.forEach(s => { s.complete = false; s.matched = 0; });
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('solutionSteps').innerHTML = '';
  renderAll();
}

// ---- AUTO SOLVER ----
function autoSolve() {
  resetGame();

  // Build combined target chain using dynamic programming
  // Try all possible orderings and find shortest chain covering all sequences
  const allOrders = permutations(sequences.map((_, i) => i));
  let bestPath = null;
  let bestLen = Infinity;

  for (const order of allOrders) {
    const chain = mergeSequences(order.map(i => sequences[i].codes));
    if (chain && chain.length <= bufferSize && chain.length < bestLen) {
      const path = findPath(chain);
      if (path) {
        bestLen = chain.length;
        bestPath = path;
      }
    }
  }

  if (!bestPath) {
    // Try partial - just first 2
    const partialOrders = permutations([0,1,2]);
    for (const order of partialOrders) {
      for (let take = sequences.length; take >= 1; take--) {
        const chain = mergeSequences(order.slice(0, take).map(i => sequences[i].codes));
        if (chain && chain.length <= bufferSize) {
          const path = findPath(chain);
          if (path && chain.length < bestLen) {
            bestLen = chain.length;
            bestPath = path;
          }
        }
      }
      if (bestPath) break;
    }
  }

  if (!bestPath) {
    document.getElementById('resultMsg').className = 'result-msg fail';
    document.getElementById('resultMsg').style.display = 'block';
    document.getElementById('resultMsg').textContent = '✗ NO SOLUTION FOUND FOR CURRENT MATRIX';
    return;
  }

  // Animate solution
  animateSolution(bestPath);
}

function mergeSequences(seqs) {
  if (!seqs.length) return [];
  let chain = [...seqs[0]];
  for (let i = 1; i < seqs.length; i++) {
    const next = seqs[i];
    // Find max overlap
    let merged = false;
    for (let overlap = Math.min(chain.length, next.length); overlap > 0; overlap--) {
      const tail = chain.slice(chain.length - overlap).join(',');
      const head = next.slice(0, overlap).join(',');
      if (tail === head) {
        chain = [...chain, ...next.slice(overlap)];
        merged = true;
        break;
      }
    }
    if (!merged) chain = [...chain, ...next];
  }
  return chain;
}

function permutations(arr) {
  if (arr.length <= 1) return [arr];
  const result = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = [...arr.slice(0,i), ...arr.slice(i+1)];
    for (const p of permutations(rest)) result.push([arr[i], ...p]);
  }
  return result;
}

function findPath(targetCodes) {
  // BFS/DFS to find a path through the matrix matching targetCodes
  // State: {row, col, turnIsRow, codeIdx, path}
  const usedKey = (path) => path.map(p => `${p.row},${p.col}`).join('|');

  function dfs(codeIdx, curRow, curCol, isRowTurn, path, usedSet) {
    if (codeIdx >= targetCodes.length) return path;
    if (path.length >= bufferSize) return null;

    const target = targetCodes[codeIdx];

    // Enumerate possible cells
    let candidates = [];
    if (path.length === 0) {
      // First move: any cell in row 0 with matching code
      for (let c = 0; c < gridSize; c++) {
        if (matrix[0][c] === target) candidates.push({row: 0, col: c});
      }
    } else if (isRowTurn) {
      for (let c = 0; c < gridSize; c++) {
        if (matrix[curRow][c] === target) candidates.push({row: curRow, col: c});
      }
    } else {
      for (let r = 0; r < gridSize; r++) {
        if (matrix[r][curCol] === target) candidates.push({row: r, col: curCol});
      }
    }

    for (const cand of candidates) {
      const key = `${cand.row},${cand.col}`;
      if (usedSet.has(key)) continue;
      usedSet.add(key);
      const result = dfs(codeIdx + 1, cand.row, cand.col, !isRowTurn, [...path, {...cand, code: target}], usedSet);
      if (result) return result;
      usedSet.delete(key);
    }
    return null;
  }

  return dfs(0, 0, 0, true, [], new Set());
}

function animateSolution(path) {
  const stepsEl = document.getElementById('solutionSteps');
  stepsEl.innerHTML = '';

  let i = 0;
  function step() {
    if (i >= path.length) return;
    const p = path[i];
    selectCell(p.row, p.col);

    const stepEl = document.createElement('div');
    stepEl.className = 'solution-step active';
    stepEl.textContent = `${i+1}. ${p.code}  →  ROW ${p.row+1}, COL ${p.col+1}`;
    stepsEl.appendChild(stepEl);
    // dim previous
    stepsEl.querySelectorAll('.solution-step').forEach((el, idx) => {
      if (idx < i) el.classList.remove('active');
    });

    i++;
    if (i < path.length) setTimeout(step, 400);
  }
  setTimeout(step, 200);
}

// ---- CONFIG ----
function buildMatrixInputs() {
  const container = document.getElementById('matrixInputs');
  container.innerHTML = '<div style="font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:8px;">EDIT MATRIX CELLS (hex codes)</div>';
  for (let r = 0; r < gridSize; r++) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:4px;margin-bottom:4px;';
    for (let c = 0; c < gridSize; c++) {
      const inp = document.createElement('input');
      inp.className = 'config-input';
      inp.value = matrix[r] ? (matrix[r][c] || '1C') : '1C';
      inp.maxLength = 2;
      inp.dataset.r = r;
      inp.dataset.c = c;
      inp.style.width = '44px';
      inp.oninput = () => { inp.value = inp.value.toUpperCase(); };
      row.appendChild(inp);
    }
    container.appendChild(row);
  }
}

function loadMatrix() {
  const inputs = document.querySelectorAll('#matrixInputs input');
  matrix = Array.from({length: gridSize}, () => Array(gridSize).fill('1C'));
  inputs.forEach(inp => {
    matrix[inp.dataset.r][inp.dataset.c] = inp.value.toUpperCase() || '1C';
  });
  resetGame();
}

function loadPreset() {
  matrix = DEFAULT_MATRIX.map(r => [...r]);
  sequences = DEFAULT_SEQUENCES.map(s => ({...s, codes: [...s.codes]}));
  seqInputs = DEFAULT_SEQUENCES.map(s => ({name: s.name, codes: [...s.codes]}));
  gridSize = 6;
  bufferSize = 6;
  document.getElementById('gridSizeSelect').value = '6';
  document.getElementById('bufferSizeSelect').value = '6';
  buildMatrixInputs();
  buildSeqInputArea();
  resetGame();
}

function triggerScreenshotUpload() {
  document.getElementById('screenshotInput').click();
}

async function handleScreenshotUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const statusEl = document.getElementById('scanStatus');
  statusEl.style.display = 'block';
  statusEl.style.color = 'var(--cyan)';
  statusEl.textContent = '⟳ SCANNING IMAGE VIA NEURAL INTERFACE...';

  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });

  const prompt = `You are analyzing a Cyberpunk 2077 Breach Protocol screenshot. Extract ALL of the following carefully:

1. CODE MATRIX: The grid of 2-character hex codes on the LEFT side under "CODE MATRIX". Read every row left-to-right, top-to-bottom. Count rows and columns carefully — do not skip any.

2. SEQUENCES: Listed on the RIGHT side under "SEQUENCE REQUIRED TO UPLOAD DAEMON". Each sequence has a name (like BASIC DATAMINE, ADVANCED DATAMINE, EXPERT DATAMINE) and a short list of 2-4 codes. Extract ALL sequences visible, in the order they appear.

3. BUFFER SIZE: Count the number of empty buffer slot boxes shown at the top center of the screen. This is typically between 4 and 8.

Respond ONLY with a raw JSON object. No markdown, no code fences, no explanation — just the JSON:
{"bufferSize":6,"gridSize":6,"matrix":[["BD","55","E9","55","1C","55"],["7A","7A","1C","55","7A","BD"],["55","7A","1C","7A","BD","1C"],["1C","1C","55","55","BD","1C"],["BD","55","55","7A","55","BD"],["55","7A","7A","55","1C","E9"]],"sequences":[{"name":"BASIC DATAMINE","codes":["E9","1C"]},{"name":"ADVANCED DATAMINE","codes":["1C","BD"]},{"name":"EXPERT DATAMINE","codes":["1C","7A","E9"]}]}

Important rules: all codes must be exactly 2 uppercase hex characters (1C 7A 55 BD E9 FF only); all matrix rows must have equal length matching gridSize; include every sequence visible; if buffer count is unclear default to 6.`;

  try {
    // Call our server-side proxy (keeps API key secret)
    const response = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageBase64: base64,
        mediaType: file.type || 'image/png'
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'Server error');
    }

    const parsed = await response.json();

    // Apply parsed data
    gridSize = parsed.gridSize || parsed.matrix.length || 6;
    bufferSize = parsed.bufferSize || 6;
    matrix = parsed.matrix;
    sequences = parsed.sequences.map(s => ({ ...s, complete: false, matched: 0 }));
    seqInputs = parsed.sequences.map(s => ({ name: s.name, codes: [...s.codes] }));

    document.getElementById('gridSizeSelect').value = String(gridSize);
    document.getElementById('bufferSizeSelect').value = String(bufferSize);
    buildMatrixInputs();
    buildSeqInputArea();
    resetGame();

    statusEl.style.color = 'var(--yellow)';
    statusEl.textContent = `✓ SCAN COMPLETE — ${gridSize}×${gridSize} MATRIX, ${sequences.length} SEQUENCES LOADED`;
    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);

  } catch (err) {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = '✗ SCAN FAILED — ' + (err.message || 'UNKNOWN ERROR');
    console.error(err);
  }
}

function updateBufferSize() {
  bufferSize = parseInt(document.getElementById('bufferSizeSelect').value);
  resetGame();
}

function resizeGrid() {
  gridSize = parseInt(document.getElementById('gridSizeSelect').value);
  matrix = Array.from({length: gridSize}, (_, r) =>
    Array.from({length: gridSize}, (_, c) =>
      DEFAULT_MATRIX[r] ? (DEFAULT_MATRIX[r][c] || '1C') : '1C'
    )
  );
  buildMatrixInputs();
  resetGame();
}

// ---- SEQUENCE CONFIG ----
function buildSeqInputArea() {
  const area = document.getElementById('seqInputArea');
  area.innerHTML = '';
  seqInputs.forEach((seq, si) => {
    const row = document.createElement('div');
    row.style.cssText = 'margin-bottom:10px;';

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:4px;';

    const nameInp = document.createElement('input');
    nameInp.className = 'config-input';
    nameInp.style.width = '180px';
    nameInp.value = seq.name;
    nameInp.oninput = () => { seqInputs[si].name = nameInp.value; };

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '×';
    removeBtn.onclick = () => { seqInputs.splice(si, 1); buildSeqInputArea(); };

    header.appendChild(nameInp);
    header.appendChild(removeBtn);
    row.appendChild(header);

    const codesRow = document.createElement('div');
    codesRow.style.cssText = 'display:flex;gap:4px;align-items:center;flex-wrap:wrap;';

    seq.codes.forEach((code, ci) => {
      const inp = document.createElement('input');
      inp.className = 'config-input';
      inp.value = code;
      inp.maxLength = 2;
      inp.style.width = '46px';
      inp.oninput = () => { seqInputs[si].codes[ci] = inp.value.toUpperCase(); };
      codesRow.appendChild(inp);
    });

    const addCode = document.createElement('button');
    addCode.className = 'btn btn-secondary';
    addCode.style.cssText = 'font-size:10px;padding:4px 8px;';
    addCode.textContent = '+';
    addCode.onclick = () => { seqInputs[si].codes.push('1C'); buildSeqInputArea(); };
    codesRow.appendChild(addCode);

    row.appendChild(codesRow);
    area.appendChild(row);
  });
}

function addSequence() {
  seqInputs.push({ name: 'NEW DAEMON', codes: ['1C'] });
  buildSeqInputArea();
}

function applySequences() {
  sequences = seqInputs.map(s => ({ name: s.name, codes: [...s.codes], complete: false, matched: 0 }));
  resetGame();
}

init();
